        const sectionHeaders = ['productivity', 'market', 'payment', 'games'];

        function changeLanguage(langcode) {
            if (!translations[langcode]) return;
            const dict = translations[langcode];

            // Set document language
            document.documentElement.lang = dict.langDir;

            // 1. Basic i18n span replacements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.textContent = dict[key];
                }
            });

            // 2. Hybrid vs Single Language Logic overrides
            if (langcode === 'hy') {
                // Header catchphrase
                document.getElementById('header-text-container').innerHTML = `
                    <p class="subtitle-ja">${dict.catchphrase_ja}</p>
                    <p class="subtitle-en">${dict.catchphrase_en}</p>
                `;

                // Section subtitle headers
                sectionHeaders.forEach(key => {
                    const el = document.getElementById(`header-sub_${key}`);
                    if (el) el.innerHTML = `<p class="section-en" style="${key === 'custom' ? 'text-align:center;' : ''}">${dict[`header_sub_${key}`] || ''}</p>`;
                });

                // Tool descriptions
                descriptiveSections.forEach(key => {
                    const el = document.getElementById(`desc_${key}`);
                    if (el) {
                        el.innerHTML = `
                            <p class="${key === 'custom' ? '' : 'desc-ja'}" style="${key === 'custom' ? 'text-align:center;' : ''}">${dict[`desc_${key}_ja`]}</p>
                            <p class="desc-en" style="${key === 'custom' ? 'text-align:center;' : ''}">${dict[`desc_${key}_en`]}</p>
                        `;
                    }
                });

                // Footer
                document.getElementById('footer-text-container').innerHTML = `
                    <p>${dict.footer_copy_ja}</p>
                    <p class="footer-en">${dict.footer_copy_en}</p>
                `;

            } else {
                // Single language rendering
                document.getElementById('header-text-container').innerHTML = `
                    <p class="subtitle-ja">${dict.catchphrase}</p>
                `;

                sectionHeaders.forEach(key => {
                    const el = document.getElementById(`header-sub_${key}`);
                    if (el) el.innerHTML = '';
                });

                descriptiveSections.forEach(key => {
                    const el = document.getElementById(`desc_${key}`);
                    if (el) {
                        el.innerHTML = `<p class="${key === 'custom' ? '' : 'desc-ja'}" style="${key === 'custom' ? 'text-align:center;' : ''}">${dict[`desc_${key}`]}</p>`;
                    }
                });

                document.getElementById('footer-text-container').innerHTML = `
                    <p>${dict.footer_copy}</p>
                `;
            }

            // Append ?lang= to all internal tool links
            document.querySelectorAll('a.primary').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.startsWith('./')) {
                    const basePath = href.split('?')[0];
                    link.setAttribute('href', `${basePath}?lang=${langcode}`);
                }
            });

            // Save preference
            localStorage.setItem('preferredLanguage', langcode);
        }

        // Initialize language
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('preferredLanguage');
            const userLang = navigator.language || navigator.userLanguage;

            let initialLang = 'hy'; // default to Hybrid

            if (savedLang && translations[savedLang]) {
                initialLang = savedLang;
            } else if (userLang.startsWith('en')) {
                initialLang = 'en';
            } else if (userLang.startsWith('zh')) {
                initialLang = 'zh';
            } else if (userLang.startsWith('hi')) {
                initialLang = 'hi';
            }

            document.getElementById('lang-select').value = initialLang;
            changeLanguage(initialLang);
        });
    </script>
